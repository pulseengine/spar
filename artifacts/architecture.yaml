  # ── Rendering Quality Decisions ──────────────────────────────────────

  - id: ARCH-R1
    type: design-decision
    status: implemented
    satisfies: [RENDER-REQ-002]
    title: Port-aware layout
    description: >
      Graph nodes gain explicit ports with side placement, direction
      indicators, and type metadata. Edges connect to specific ports
      rather than node centers, ensuring visual fidelity to the AADL
      connection topology.
    fields:
      rationale: >
        Port-aware layout eliminates ambiguity about which features are
        connected. Side placement (inputs left, outputs right) matches
        data-flow reading direction and AADL port semantics.
      interfaces:
        provides: [EtchNode with ports, port side/direction/type metadata]
        requires: [spar-hir instance model]
    links:
      - type: satisfies
        target: RENDER-REQ-002

  - id: ARCH-R2
    type: design-decision
    status: implemented
    satisfies: [RENDER-REQ-001]
    title: Orthogonal edge routing
    description: >
      A visibility-graph router with obstacle avoidance replaces bezier
      curves. Edges follow rectilinear (horizontal/vertical) paths,
      routing around component boxes to minimize crossings.
    fields:
      rationale: >
        Orthogonal routing is standard in EDA and architecture tools
        because it produces clean, traceable connection paths. The
        visibility-graph approach guarantees obstacle avoidance without
        requiring manual layout adjustment.
      interfaces:
        provides: [orthogonal edge paths, crossing minimization]
        requires: [EtchNode positions, port positions]
    links:
      - type: satisfies
        target: RENDER-REQ-001

  - id: ARCH-R3
    type: design-decision
    status: implemented
    satisfies: [RENDER-REQ-003]
    title: Interactive HTML wrapper
    description: >
      A self-contained HTML file with embedded JavaScript provides
      pan, zoom, minimap, search, and selection/highlighting. No
      external dependencies — the entire interactive viewer is a
      single file.
    fields:
      rationale: >
        Single-file HTML eliminates deployment complexity and works
        in any browser. No external dependencies means the artifact
        is reproducible and archivable for certification evidence.
      interfaces:
        provides: [pan, zoom, minimap, search, selection highlighting]
        requires: [SVG rendering output]
    links:
      - type: satisfies
        target: RENDER-REQ-003
      - type: satisfies
        target: RENDER-REQ-005

  - id: ARCH-R4
    type: design-decision
    status: implemented
    satisfies: [RENDER-REQ-004]
    title: GLSP-inspired separation
    description: >
      Layout computation (GraphLayout) is separated from rendering
      (SVG/HTML output). The layout phase produces abstract positions
      and routed edges; the render phase converts to visual output.
      This separation enables deterministic layout independent of
      rendering format.
    fields:
      rationale: >
        Separating layout from rendering enables testing layout
        determinism without rendering, supports multiple output formats
        (SVG, HTML, PDF) from the same layout, and allows layout
        algorithm evolution without breaking rendering.
      interfaces:
        provides: [GraphLayout with node/edge positions]
        requires: [spar-hir instance model]
    links:
      - type: satisfies
        target: RENDER-REQ-004
      - type: satisfies
        target: RENDER-REQ-006

  - id: ARCH-R5
    type: design-decision
    status: implemented
    title: VS Code extension with native LSP and WASM rendering
    description: >
      VS Code extension combines native spar binary for LSP editing
      intelligence (10 IDE features) with jco-transpiled spar-wasm
      for in-process diagram rendering. WASI filesystem calls are
      shimmed to read workspace files. Webview panel shows interactive
      HTML from etch with ports, orthogonal routing, and pan/zoom.
    fields:
      rationale: >
        Bundling the native binary per platform ensures zero-config
        installation. WASM renderer provides in-process rendering
        without spawning a child process.
    tags: [architecture, tooling, vscode]
    links:
      - type: satisfies
        target: REQ-LSP-001
      - type: satisfies
        target: RENDER-REQ-003

  # ── v0.3.0 Architecture Decisions ──────────────────────────────────────

  - id: ARCH-ANALYSIS-001
    type: design-decision
    status: implemented
    title: New analysis passes follow existing Analysis trait
    description: >
      RTA, bus bandwidth, memory budget, and weight/power analysis passes
      are each independent modules implementing the existing Analysis trait.
      They register with AnalysisRunner and produce AnalysisDiagnostic
      results, consistent with the existing passes.
    fields:
      rationale: >
        Reusing the established Analysis trait + AnalysisRunner pattern keeps
        all passes composable and independently testable. No framework changes
        needed — new passes are drop-in modules.
      interfaces:
        provides: [RtaAnalysis, BusBandwidthAnalysis, MemoryBudgetAnalysis, WeightPowerAnalysis]
        requires: [spar-hir-def instance model, Analysis trait]
    tags: [architecture, analysis, v030]
    links:
      - type: satisfies
        target: REQ-RTA-001
      - type: satisfies
        target: REQ-BUS-001
      - type: satisfies
        target: REQ-MEMBUD-001
      - type: satisfies
        target: REQ-WEIGHTPOWER-001

  - id: ARCH-DIFF-001
    type: design-decision
    status: implemented
    title: Git worktrees for revision comparison
    description: >
      Structural diff uses git worktrees to check out two revisions
      simultaneously, instantiates each through the standard spar pipeline,
      and compares the resulting instance models structurally. Analysis
      impact is computed by running the same passes on both revisions and
      diffing the diagnostics.
    fields:
      rationale: >
        Git worktrees avoid cloning or temporary directories. Reusing the
        existing instantiation pipeline means the diff sees exactly what
        spar analyze sees — no custom model loading. SARIF output reuses
        the existing diagnostic severity/location types.
      interfaces:
        provides: [StructuralDiff, AnalysisImpact, SarifExport, MergeConflictDetector]
        requires: [spar-hir instance model, spar-analysis, git]
    tags: [architecture, diff, v030]
    links:
      - type: satisfies
        target: REQ-DIFF-001
      - type: satisfies
        target: REQ-DIFF-002
      - type: satisfies
        target: REQ-DIFF-003

  - id: ARCH-MCP-001
    type: design-decision
    status: planned
    title: MCP server as CLI command with stdio JSON-RPC transport
    description: >
      The MCP server is a new spar CLI subcommand (spar mcp) that
      communicates over stdio using JSON-RPC. Analysis passes are exposed
      as MCP tools, instance model elements as MCP resources. The server
      reuses the existing Database and AnalysisRunner infrastructure.
    fields:
      rationale: >
        stdio JSON-RPC is the standard MCP transport — no HTTP server needed.
        Implementing as a CLI subcommand means no new binary and reuses the
        existing spar database initialization. MCP tools map 1:1 to analysis
        passes, and resources map to instance model queries.
      interfaces:
        provides: [spar mcp command, MCP tools, MCP resources]
        requires: [spar-hir Database, spar-analysis AnalysisRunner]
    tags: [architecture, mcp, v040]
    links:
      - type: satisfies
        target: REQ-MCP-001

  - id: ARCH-VERIFY-001
    type: design-decision
    status: implemented
    title: Property assertion DSL over HIR instance model
    description: >
      Property assertions are declarative rules written in a compact DSL
      that query the HIR instance model. Each assertion specifies a scope
      (component selector), a property path, and a constraint. The verify
      command evaluates assertions and reports pass/fail with evidence
      including the actual property value and component path.
    fields:
      rationale: >
        A declarative DSL avoids requiring users to write Rust code for
        custom checks. Operating over the HIR instance model means
        assertions see fully resolved properties after inheritance and
        default evaluation. The DSL can also reference analysis results.
      interfaces:
        provides: [AssertionDSL, spar verify command, AssertionResult]
        requires: [spar-hir instance model]
    tags: [architecture, verification, v030]
    links:
      - type: satisfies
        target: REQ-VERIFY-001

  - id: ARCH-QUERY-001
    type: design-decision
    status: planned
    title: "Path-expression query language: components.where().property() pattern"
    description: >
      Query expressions use a method-chain syntax over the instance model:
      components.where(predicate).property(name) selects components matching
      a predicate and extracts property values. Supports category filters,
      property existence checks, value comparisons, and aggregation
      (count, sum, min, max).
    fields:
      rationale: >
        Method-chain syntax is familiar to developers and composable.
        Path expressions map naturally to the instance model hierarchy.
        The query layer sits on top of the existing instance model —
        no separate index or database required.
      interfaces:
        provides: [QueryExpression, QueryResult, spar query command]
        requires: [spar-hir instance model]
    tags: [architecture, query, v040]
    links:
      - type: satisfies
        target: REQ-QUERY-001

  - id: ARCH-KNOWLEDGE-001
    type: design-decision
    status: planned
    title: Instance model is the knowledge base; query layer on top
    description: >
      The spar instance model (SystemInstance with its arena-allocated
      component, connection, and property data) serves as the single
      knowledge base for all queries, analysis, and MCP resources. The
      query language and MCP server access it through the existing HIR
      facade — no separate database or index is built.
    fields:
      rationale: >
        The instance model already contains all structural and property
        information needed for queries. Adding a separate database would
        duplicate data and create synchronization complexity. The salsa
        incremental engine already provides caching and invalidation.
      interfaces:
        provides: [unified knowledge base]
        requires: [spar-hir-def SystemInstance, spar-hir facade]
    tags: [architecture, knowledge, v040]
    links:
      - type: satisfies
        target: REQ-QUERY-001
      - type: traces-to
        target: REQ-MCP-001

  # ── Deployment Solver Architecture ─────────────────────────────────────

  - id: ARCH-SOLVER-001
    type: design-decision
    status: planned
    title: "NDS-layered hierarchical solving"
    description: >
      Deployment optimization uses 4 hierarchical layers analogous to NDS
      navigation. Layer 0 (Component): RTA/scheduling per processor — already
      implemented. Layer 1 (Cluster): bin-packing with schedulability
      validation — FFD/BFD heuristics in pure Rust. Layer 2 (System): topology
      graph extraction + bus binding optimization — petgraph-based. Layer 3
      (Global): cross-zone E2E + safety decomposition — exact solver
      (MILP/CP-SAT). Local solutions compose into globally valid configurations.
    fields:
      rationale: >
        Hierarchical decomposition makes NP-hard problem tractable. Each layer
        is independently testable. Layers 0-2 use pure Rust (WASM-compatible).
        Layer 3 optionally uses native solver backends.
    tags: [architecture, solver, v040]
    links:
      - type: satisfies
        target: REQ-SOLVER-004

  - id: ARCH-SOLVER-002
    type: design-decision
    status: implemented
    title: Topology graph as petgraph
    description: >
      Hardware topology extracted from AADL instance model into a petgraph
      DiGraph. Processor nodes with capacity properties (CPU budget, memory,
      scheduling policy). Bus edges with bandwidth and protocol properties.
      Memory nodes with size properties. Used as the target graph for
      deployment allocation.
    fields:
      rationale: >
        petgraph already used in spar-render for layout. Reusing it for
        topology avoids new dependencies. Graph operations (shortest path,
        connectivity, coloring) are well-supported.
    tags: [architecture, solver, v030]
    links:
      - type: satisfies
        target: REQ-SOLVER-001

  - id: ARCH-SOLVER-003
    type: design-decision
    status: implemented
    title: Virtual bus library as AADL package
    description: >
      Communication protocols modeled as AADL virtual bus types in a standard
      library package. Each virtual bus type has properties: latency_overhead,
      bandwidth_capacity, max_payload, security_profile, bus_type_compatibility.
      Solver selects from compatible virtual buses when binding connections to
      physical buses.
    fields:
      rationale: >
        Using native AADL virtual bus types means the protocol catalog is part
        of the model, not external configuration. Engineers can extend the
        library with custom protocols. spar's existing property system reads
        the values.
    tags: [architecture, solver, v030]
    links:
      - type: satisfies
        target: REQ-SOLVER-002

  - id: ARCH-SOLVER-004
    type: design-decision
    status: implemented
    title: Pure Rust bin-packing for Layer 1
    description: >
      Process-to-processor allocation uses First-Fit Decreasing (FFD) and
      Best-Fit Decreasing (BFD) bin-packing heuristics with schedulability
      validation. After tentative allocation, RTA is run per processor. If
      schedulability fails, the process is tried on the next candidate. Pure
      Rust, no external dependencies, WASM-compatible.
    fields:
      rationale: >
        FFD gives 11/9-approximation to optimal. Combined with RTA validation,
        this catches infeasible allocations immediately. Pure Rust ensures WASM
        compatibility. Good enough for 80% of practical use cases; exact solver
        handles the rest.
    tags: [architecture, solver, v040]
    links:
      - type: satisfies
        target: REQ-SOLVER-004

  - id: ARCH-SOLVER-005
    type: design-decision
    status: implemented
    title: Source rewriting via rowan CST
    description: >
      Solver output applied by constructing TextEdit operations on the AADL
      source via rowan CST. Insert/update Actual_Processor_Binding,
      Actual_Memory_Binding, Actual_Connection_Binding properties. Preserves
      formatting, comments, and all other source content. Changes validated
      incrementally via salsa before committing.
    fields:
      rationale: >
        Rowan's lossless CST preserves every byte of source. LSP code actions
        already use this pattern (4 existing quick-fixes). Salsa ensures only
        affected analyses re-run after changes.
    tags: [architecture, solver, v030]
    links:
      - type: satisfies
        target: REQ-SOLVER-007

  - id: ARCH-SOLVER-006
    type: design-decision
    status: planned
    title: "Dual solver strategy (WASM heuristic + native exact)"
    description: >
      Two solver tiers. Tier 1 (WASM): pure Rust heuristics (FFD/BFD
      bin-packing, NSGA-II for Pareto). Runs in browser and CLI. Tier 2
      (native): exact solver via good_lp+HiGHS (MILP) or cp_sat (CP-SAT).
      Returns optimality certificates. CLI only due to C++ dependencies.
    fields:
      rationale: >
        WASM compatibility for Tier 1 enables browser-based architecture
        exploration. Tier 2 provides formal guarantees for certification
        evidence. Engineers start with Tier 1 for interactive exploration,
        then run Tier 2 for final optimization.
    tags: [architecture, solver, v040]
    links:
      - type: satisfies
        target: REQ-SOLVER-005
      - type: satisfies
        target: REQ-SOLVER-006

  # ── Code Generation (v0.4.0) ──────────────────────────────────────────

  - id: ARCH-CODEGEN-001
    type: design-decision
    status: implemented
    title: "spar-codegen crate with dual output (WIT + native Rust)"
    description: >
      New spar-codegen crate generates both WIT interfaces and Rust crate
      skeletons from AADL instance model. Process → crate + WIT world,
      thread → async fn, data port → typed channel / WIT stream. System
      generates Cargo workspace + WAC composition.
    fields:
      rationale: >
        Dual output serves both WASM component model (WIT path) and
        traditional embedded (native Rust path). The same crate can be
        both a native library and a WASM component. WIT defines the
        contract, Rust implements it.
      interfaces:
        provides: [spar codegen command, WIT generation, Rust skeleton, Cargo workspace]
        requires: [spar-hir-def SystemInstance, spar-transform WitTransform]
    tags: [architecture, codegen, v040]
    links:
      - type: satisfies
        target: REQ-CODEGEN-001
      - type: satisfies
        target: REQ-CODEGEN-WIT
      - type: satisfies
        target: REQ-CODEGEN-RUST
      - type: satisfies
        target: STPA-SEC-REQ-001

  - id: ARCH-CODEGEN-002
    type: design-decision
    status: implemented
    title: "Three-layer verification (build + test + proof)"
    description: >
      All generated code includes three verification layers: (1) build-time
      #[aadl(...)] attribute checking against model, (2) test-time contract
      + timing tests, (3) formal Lean4 scheduling proofs + Kani bounded
      model checking. Per PulseEngine Verification Guide multi-track approach.
      Code targets feature intersection of Verus/Kani/Lean4/plain Rust.
    fields:
      rationale: >
        Each layer catches different classes of drift: structural (build),
        behavioral (test), mathematical (proof). Multiple candidates per
        the Verification Guide improve success rate from 60% to 91%.
        Feature intersection ensures all tracks can analyze the same code.
    tags: [architecture, codegen, verification, v040]
    links:
      - type: satisfies
        target: REQ-CODEGEN-VERIFY-BUILD
      - type: satisfies
        target: REQ-CODEGEN-VERIFY-TEST
      - type: satisfies
        target: REQ-CODEGEN-VERIFY-PROOF

  - id: ARCH-CODEGEN-003
    type: design-decision
    status: implemented
    title: "Dual build system (Cargo dev + Bazel CI)"
    description: >
      Generated workspace includes both Cargo.toml (development iteration)
      and BUILD.bazel (hermetic CI + verification). Bazel runs wit-bindgen
      as build action (plain .rs output, no proc macro), rules_verus,
      rules_lean, rules_wasm_component. Cargo uses proc macros for
      build-time checks and standard cargo test for test-time checks.
    fields:
      rationale: >
        Cargo for fast iteration, Bazel for hermetic verification. wit-bindgen
        as Bazel action produces readable, diffable, verifiable plain Rust
        instead of hidden proc macro expansion. Lean4 and Verus need Bazel
        for hermetic tool management.
    tags: [architecture, codegen, bazel, v040]
    links:
      - type: satisfies
        target: REQ-CODEGEN-BAZEL

  - id: ARCH-CODEGEN-004
    type: design-decision
    status: implemented
    title: "rivet frontmatter in generated design docs"
    description: >
      Each generated crate includes a design document with rivet YAML
      frontmatter (id, type, links). Verification records generated as
      rivet verification-verdict artifacts. Link types chosen for SysML v2
      forward compatibility (satisfies → satisfy, verifies → verify).
    fields:
      rationale: >
        Generated documents participate in rivet's traceability graph
        automatically. When SysML v2 parser extracts requirements, the
        existing generated verification artifacts already have compatible
        link types — no retrofit needed.
    tags: [architecture, codegen, rivet, v040]
    links:
      - type: satisfies
        target: REQ-CODEGEN-RIVET

  - id: ARCH-SYSML2-002
    type: design-decision
    status: implemented
    title: "Rowan-based KerML parser (spar-sysml2 crate)"
    description: >
      New spar-sysml2 crate with hand-written recursive descent parser for
      KerML/SysML v2 textual notation. Same architecture as spar-parser:
      rowan lossless CST, error recovery, SyntaxKind enum (~200 variants).
      Covers core KerML + SysML v2 profile constructs.
    fields:
      rationale: >
        KerML is just another grammar — rowan handles it identically to AADL.
        No Rust SysML v2 parser exists (pilot is Java-only). Hand-written
        recursive descent gives fine-grained error recovery needed for IDE
        integration.
    tags: [architecture, sysml2, parser, v040]
    links:
      - type: satisfies
        target: REQ-SYSML2-PARSE
      - type: satisfies
        target: REQ-INTEROP-001

  - id: ARCH-SYSML2-003
    type: design-decision
    status: implemented
    title: "SysML v2 → AADL lowering via SEI mapping rules"
    description: >
      Lowering from SysML v2 CST to AADL ItemTree implementing the SEI 2023
      mapping specification. part def → system/process type, port def → data
      port, connection def → connection, constraint def → timing properties,
      allocate → deployment bindings. Requirements extracted to rivet YAML
      with satisfy/verify link preservation.
    fields:
      rationale: >
        The SEI is specifying this mapping — implementing it makes spar the
        reference Rust implementation. SysML v2 requirements flow into rivet,
        enabling traceability from system requirements through architecture
        through code through verification evidence.
    tags: [architecture, sysml2, transform, v040]
    links:
      - type: satisfies
        target: REQ-SYSML2-LOWER
      - type: satisfies
        target: REQ-SYSML2-EXTRACT

