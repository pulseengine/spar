# Spar toolchain architecture — 10-crate Rust workspace

artifacts:

  # ── System Level ───────────────────────────────────────────────────────

  - id: ARCH-SYS
    type: feature
    title: Spar AADL Toolchain
    description: >
      10-crate Rust workspace implementing an AADL v2.2 toolchain
      with incremental computation (salsa), lossless syntax (rowan),
      and arena allocation (la-arena).

  # ── Crate Components ──────────────────────────────────────────────────

  - id: ARCH-PARSER
    type: design-decision
    title: spar-parser
    description: >
      AADL v2.2 parser producing a lossless concrete syntax tree (CST)
      using rowan. Hand-written recursive descent with error recovery.
    fields:
      rationale: >
        Hand-written recursive descent chosen over parser generators for
        fine-grained error recovery and lossless CST preservation. Rowan
        provides the green/red tree architecture for IDE-grade parsing.
      interfaces:
        provides: [parse(source) -> GreenNode]
    links:
      - type: satisfies
        target: REQ-PARSE-001
      - type: satisfies
        target: REQ-PARSE-002

  - id: ARCH-SYNTAX
    type: design-decision
    title: spar-syntax
    description: >
      Typed syntax tree wrapper over rowan GreenNode. Defines SyntaxKind
      enum and typed AST node accessors.
    fields:
      rationale: >
        Typed wrapper layer provides compile-time safety when navigating
        the CST. Generated AST node types mirror AADL grammar productions.
      interfaces:
        provides: [SourceFile, AstNode trait]
        requires: [spar-parser]
    links:
      - type: satisfies
        target: REQ-PARSE-001

  - id: ARCH-ANNEX
    type: design-decision
    title: spar-annex
    description: >
      Annex sublanguage parsing for EMV2 and Behavior Annex.
    fields:
      rationale: >
        Separate crate isolates annex grammar complexity from the core
        AADL parser. EMV2 is critical for safety analysis (fault trees).
      interfaces:
        provides: [parse_annex_library, parse_emv2]
        requires: [spar-parser]
    links:
      - type: satisfies
        target: REQ-ANALYSIS-005

  - id: ARCH-BASE-DB
    type: design-decision
    title: spar-base-db
    description: >
      Salsa database foundation. Defines SourceFile input and
      parse query. All other crates build on this.
    fields:
      rationale: >
        Salsa provides incremental computation with automatic invalidation.
        Centralizing the database trait here prevents circular crate deps.
      interfaces:
        provides: [BaseDatabase trait, SourceFile input]
        requires: [spar-parser, spar-syntax]
    links:
      - type: satisfies
        target: REQ-PARSE-001

  - id: ARCH-HIR-DEF
    type: design-decision
    title: spar-hir-def
    description: >
      Internal HIR definitions: ItemTree (declarative model),
      instance model, resolver, standard properties. Not public API.
    fields:
      rationale: >
        Separating internal definitions from the public facade allows
        arena-based representation (la-arena) for performance while
        exposing a value-oriented API through spar-hir.
      interfaces:
        provides: [ItemTree, SystemInstance, GlobalScope, StandardProperties]
        requires: [spar-base-db, spar-annex]
    links:
      - type: satisfies
        target: REQ-MODEL-001
      - type: satisfies
        target: REQ-MODEL-002
      - type: satisfies
        target: REQ-INST-001
      - type: satisfies
        target: REQ-PROP-001

  - id: ARCH-HIR
    type: design-decision
    title: spar-hir
    description: >
      Public facade over spar-hir-def. Value-oriented API with serde
      support. All downstream consumers use this crate.
    fields:
      rationale: >
        Facade pattern decouples consumers from internal arena indices.
        Value types with serde support enable JSON serialization and
        stable API across versions.
      interfaces:
        provides: [Database, Package, ComponentType, ComponentImpl, InstanceNode]
        requires: [spar-hir-def]
    links:
      - type: satisfies
        target: REQ-SERDE-001
      - type: satisfies
        target: REQ-MODEL-001

  - id: ARCH-ANALYSIS
    type: design-decision
    title: spar-analysis
    description: >
      22 analysis passes implementing connectivity, scheduling, latency,
      resource budget, EMV2, ARINC 653, legality rules, mode reachability,
      and more. Trait-based Analysis framework with AnalysisRunner.
    fields:
      rationale: >
        Trait-based Analysis framework allows modular registration of
        passes. Each pass is independent, enabling selective execution
        and parallel development.
      interfaces:
        provides: [Analysis trait, AnalysisRunner, AnalysisDiagnostic]
        requires: [spar-hir-def]
    links:
      - type: satisfies
        target: REQ-ANALYSIS-001
      - type: satisfies
        target: REQ-ANALYSIS-002
      - type: satisfies
        target: REQ-ANALYSIS-003
      - type: satisfies
        target: REQ-ANALYSIS-004
      - type: satisfies
        target: REQ-ANALYSIS-005
      - type: satisfies
        target: REQ-ANALYSIS-006
      - type: satisfies
        target: REQ-ANALYSIS-007
      - type: satisfies
        target: REQ-ANALYSIS-008
      - type: satisfies
        target: REQ-ANALYSIS-009

  - id: ARCH-TRANSFORM
    type: design-decision
    title: spar-transform
    description: >
      Bidirectional transforms between AADL and external formats.
      Currently implements WIT transform. Planned: WAC, wRPC, Rust crate.
    fields:
      rationale: >
        Transform trait provides uniform interface for bidirectional
        format conversion. WIT transform enables WASM component modeling.
      interfaces:
        provides: [Transform trait, WitTransform]
        requires: [spar-hir-def]
    links:
      - type: satisfies
        target: REQ-TRANSFORM-001

  - id: ARCH-CLI
    type: design-decision
    title: spar-cli
    description: >
      CLI binary with subcommands: parse, items, instance, analyze,
      transform, lsp, render. Manual arg parsing.
    fields:
      rationale: >
        Manual arg parsing avoids clap dependency weight. Subcommand
        structure mirrors the toolchain pipeline stages.
      interfaces:
        provides: [spar binary]
        requires: [spar-hir, spar-analysis, spar-transform]
    links:
      - type: satisfies
        target: REQ-LSP-001
      - type: satisfies
        target: REQ-SERDE-001

  - id: ARCH-WASM
    type: design-decision
    title: spar-wasm
    description: >
      WASM component exporting adapter and renderer interfaces via WIT.
      Compiles to wasm32-wasip2. 1.3MB release binary.
    fields:
      rationale: >
        WASM target enables rivet runtime integration without process
        spawning. WIT interfaces match rivet adapter/renderer contracts.
      interfaces:
        provides: [adapter.import, adapter.analyze, renderer.render, renderer.analyze]
        requires: [spar-hir, spar-analysis]
    links:
      - type: satisfies
        target: REQ-WASM-001

  # ── Rendering Quality Decisions ──────────────────────────────────────

  - id: ARCH-R1
    type: design-decision
    status: implemented
    satisfies: [RENDER-REQ-002]
    title: Port-aware layout
    description: >
      Graph nodes gain explicit ports with side placement, direction
      indicators, and type metadata. Edges connect to specific ports
      rather than node centers, ensuring visual fidelity to the AADL
      connection topology.
    fields:
      rationale: >
        Port-aware layout eliminates ambiguity about which features are
        connected. Side placement (inputs left, outputs right) matches
        data-flow reading direction and AADL port semantics.
      interfaces:
        provides: [EtchNode with ports, port side/direction/type metadata]
        requires: [spar-hir instance model]
    links:
      - type: satisfies
        target: RENDER-REQ-002

  - id: ARCH-R2
    type: design-decision
    status: implemented
    satisfies: [RENDER-REQ-001]
    title: Orthogonal edge routing
    description: >
      A visibility-graph router with obstacle avoidance replaces bezier
      curves. Edges follow rectilinear (horizontal/vertical) paths,
      routing around component boxes to minimize crossings.
    fields:
      rationale: >
        Orthogonal routing is standard in EDA and architecture tools
        because it produces clean, traceable connection paths. The
        visibility-graph approach guarantees obstacle avoidance without
        requiring manual layout adjustment.
      interfaces:
        provides: [orthogonal edge paths, crossing minimization]
        requires: [EtchNode positions, port positions]
    links:
      - type: satisfies
        target: RENDER-REQ-001

  - id: ARCH-R3
    type: design-decision
    status: implemented
    satisfies: [RENDER-REQ-003]
    title: Interactive HTML wrapper
    description: >
      A self-contained HTML file with embedded JavaScript provides
      pan, zoom, minimap, search, and selection/highlighting. No
      external dependencies — the entire interactive viewer is a
      single file.
    fields:
      rationale: >
        Single-file HTML eliminates deployment complexity and works
        in any browser. No external dependencies means the artifact
        is reproducible and archivable for certification evidence.
      interfaces:
        provides: [pan, zoom, minimap, search, selection highlighting]
        requires: [SVG rendering output]
    links:
      - type: satisfies
        target: RENDER-REQ-003
      - type: satisfies
        target: RENDER-REQ-005

  - id: ARCH-R4
    type: design-decision
    status: implemented
    satisfies: [RENDER-REQ-004]
    title: GLSP-inspired separation
    description: >
      Layout computation (GraphLayout) is separated from rendering
      (SVG/HTML output). The layout phase produces abstract positions
      and routed edges; the render phase converts to visual output.
      This separation enables deterministic layout independent of
      rendering format.
    fields:
      rationale: >
        Separating layout from rendering enables testing layout
        determinism without rendering, supports multiple output formats
        (SVG, HTML, PDF) from the same layout, and allows layout
        algorithm evolution without breaking rendering.
      interfaces:
        provides: [GraphLayout with node/edge positions]
        requires: [spar-hir instance model]
    links:
      - type: satisfies
        target: RENDER-REQ-004
      - type: satisfies
        target: RENDER-REQ-006

  - id: ARCH-R5
    type: design-decision
    status: implemented
    title: VS Code extension with native LSP and WASM rendering
    description: >
      VS Code extension combines native spar binary for LSP editing
      intelligence (10 IDE features) with jco-transpiled spar-wasm
      for in-process diagram rendering. WASI filesystem calls are
      shimmed to read workspace files. Webview panel shows interactive
      HTML from etch with ports, orthogonal routing, and pan/zoom.
    tags: [architecture, tooling, vscode]
