# Spar toolchain architecture — 16-crate Rust workspace

artifacts:

  # ── System Level ───────────────────────────────────────────────────────

  - id: ARCH-SYS
    type: feature
    title: Spar AADL Toolchain
    description: >
      16-crate Rust workspace implementing an AADL v2.2 toolchain
      with incremental computation (salsa), lossless syntax (rowan),
      and arena allocation (la-arena). Crates: parser, syntax, annex,
      base-db, hir-def, hir, analysis, transform, cli, wasm, render,
      solver, sysml2, verify-macros, verify, codegen.

  # ── Crate Components ──────────────────────────────────────────────────

  - id: ARCH-PARSER
    type: design-decision
    title: spar-parser
    description: >
      AADL v2.2 parser producing a lossless concrete syntax tree (CST)
      using rowan. Hand-written recursive descent with error recovery.
    fields:
      rationale: >
        Hand-written recursive descent chosen over parser generators for
        fine-grained error recovery and lossless CST preservation. Rowan
        provides the green/red tree architecture for IDE-grade parsing.
      interfaces:
        provides: [parse(source) -> GreenNode]
    links:
      - type: satisfies
        target: REQ-PARSE-001
      - type: satisfies
        target: REQ-PARSE-002
      - type: satisfies
        target: REQ-PARSER-001

  - id: ARCH-SYNTAX
    type: design-decision
    title: spar-syntax
    description: >
      Typed syntax tree wrapper over rowan GreenNode. Defines SyntaxKind
      enum and typed AST node accessors.
    fields:
      rationale: >
        Typed wrapper layer provides compile-time safety when navigating
        the CST. Generated AST node types mirror AADL grammar productions.
      interfaces:
        provides: [SourceFile, AstNode trait]
        requires: [spar-parser]
    links:
      - type: satisfies
        target: REQ-PARSE-001

  - id: ARCH-ANNEX
    type: design-decision
    title: spar-annex
    description: >
      Annex sublanguage parsing for EMV2 and Behavior Annex.
    fields:
      rationale: >
        Separate crate isolates annex grammar complexity from the core
        AADL parser. EMV2 is critical for safety analysis (fault trees).
      interfaces:
        provides: [parse_annex_library, parse_emv2]
        requires: [spar-parser]
    links:
      - type: satisfies
        target: REQ-ANALYSIS-005

  - id: ARCH-BASE-DB
    type: design-decision
    title: spar-base-db
    description: >
      Salsa database foundation. Defines SourceFile input and
      parse query. All other crates build on this.
    fields:
      rationale: >
        Salsa provides incremental computation with automatic invalidation.
        Centralizing the database trait here prevents circular crate deps.
      interfaces:
        provides: [BaseDatabase trait, SourceFile input]
        requires: [spar-parser, spar-syntax]
    links:
      - type: satisfies
        target: REQ-PARSE-001

