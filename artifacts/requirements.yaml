# Spar toolchain requirements — derived from SAE AS5506C (AADL v2.2)
# and operational needs for the spar+rivet integration.

artifacts:

  # ── Parsing (AS5506 Ch.15) ──────────────────────────────────────────────

  - id: REQ-PARSE-001
    type: requirement
    title: AADL v2.2 lexical and syntactic parsing
    description: >
      Parse all AADL v2.2 lexical elements (identifiers, numeric literals,
      string literals, comments, 76 reserved words) and produce a lossless
      concrete syntax tree (CST) preserving every byte of input.
    status: implemented
    tags: [parsing, as5506-ch15]

  - id: REQ-PARSE-002
    type: requirement
    title: Parse error recovery with source locations
    description: >
      Report parse errors with file path, line, and column. Recover from
      errors to continue parsing the rest of the file.
    status: implemented
    tags: [parsing, diagnostics]

  # ── Declarative Model (AS5506 Ch.4-8) ──────────────────────────────────

  - id: REQ-MODEL-001
    type: requirement
    title: Declarative model construction (ItemTree)
    description: >
      Lower CST to an ItemTree capturing packages, component types,
      component implementations, feature group types, property sets, and
      all nested items (features, subcomponents, connections, flows, modes,
      prototypes, call sequences, renames).
    status: implemented
    tags: [model, as5506-ch4]

  - id: REQ-MODEL-002
    type: requirement
    title: Support all 14 component categories
    description: >
      System, process, thread, thread_group, processor, virtual_processor,
      memory, bus, virtual_bus, device, subprogram, subprogram_group,
      data, abstract.
    status: implemented
    tags: [model, as5506-ch5]

  - id: REQ-MODEL-003
    type: requirement
    title: Support all feature kinds
    description: >
      Data port, event port, event data port, parameter, data access,
      bus access, subprogram access, subprogram_group access, feature group,
      abstract feature. With direction (in/out/in_out) and array dimensions.
    status: implemented
    tags: [model, as5506-ch8]

  - id: REQ-MODEL-004
    type: requirement
    title: Support all connection kinds
    description: >
      Port connection, access connection, feature group connection,
      feature connection, parameter connection. With in_modes filtering.
    status: implemented
    tags: [model, as5506-ch9]

  - id: REQ-MODEL-005
    type: requirement
    title: Component extension (extends, refined to)
    description: >
      Support component type extension, implementation extension,
      feature refinement, and subcomponent refinement.
    status: implemented
    tags: [model, as5506-ch4]

  # ── Name Resolution (AS5506 Ch.4) ──────────────────────────────────────

  - id: REQ-RESOLVE-001
    type: requirement
    title: Cross-file classifier resolution
    description: >
      Resolve classifier references across files via with clauses.
      Case-insensitive matching per AADL spec.
    status: implemented
    tags: [resolution, as5506-ch4]

  - id: REQ-RESOLVE-002
    type: requirement
    title: Property reference resolution
    description: >
      Resolve qualified property references (PropertySet::PropertyName)
      across files.
    status: implemented
    tags: [resolution, as5506-ch11]

  # ── Instance Model (AS5506 Ch.14) ──────────────────────────────────────

  - id: REQ-INST-001
    type: requirement
    title: Recursive system instantiation
    description: >
      Recursively expand a root system implementation into a flattened
      component hierarchy with features, connections, and modes.
    status: implemented
    tags: [instance, as5506-ch14]

  - id: REQ-INST-002
    type: requirement
    title: Array subcomponent expansion
    description: >
      Expand array subcomponents (sub[N]: thread T) into N instances
      with proper indexing and connection pattern expansion.
    status: implemented
    tags: [instance, as5506-ch14]

  - id: REQ-INST-003
    type: requirement
    title: Semantic connection tracing
    description: >
      Trace connections through the hierarchy resolving across, up,
      and down patterns to produce end-to-end connection instances.
    status: partial
    tags: [instance, as5506-ch14]

  - id: REQ-INST-004
    type: requirement
    title: System Operation Modes computation
    description: >
      Compute SOMs as the cartesian product of modes across all
      modal subcomponents for each system level.
    status: implemented
    tags: [instance, as5506-ch12]

  # ── Property System (AS5506 Ch.11) ─────────────────────────────────────

  - id: REQ-PROP-001
    type: requirement
    title: Predeclared property sets
    description: >
      Support all 8 predeclared property sets with 104 properties:
      Timing, Communication, Memory, Deployment, Thread, Programming,
      Modeling, AADL_Project.
    status: implemented
    tags: [properties, as5506-ch11]

  - id: REQ-PROP-002
    type: requirement
    title: Property expression evaluation
    description: >
      Evaluate all property expression types: integer, real, string,
      boolean, enumeration, list, record, range, classifier, reference,
      computed values, unit literals.
    status: implemented
    tags: [properties, as5506-ch11]

  - id: REQ-PROP-003
    type: requirement
    title: Unit conversion
    description: >
      Parse and apply unit conversion factors for time, size, and
      rate properties (e.g., ms to us, KB to bytes).
    status: implemented
    tags: [properties, as5506-ch11]

  # ── Analysis ───────────────────────────────────────────────────────────

  - id: REQ-ANALYSIS-001
    type: requirement
    title: Connectivity analysis
    description: >
      Verify every required port has incoming connections and warn about
      unconnected features and dangling endpoints.
    status: implemented
    tags: [analysis]

  - id: REQ-ANALYSIS-002
    type: requirement
    title: Scheduling analysis (RMA)
    description: >
      Rate Monotonic Analysis on threads grouped by processor binding.
      Check utilization bounds.
    status: implemented
    tags: [analysis, scheduling]

  - id: REQ-ANALYSIS-003
    type: requirement
    title: Latency analysis
    description: >
      Compute best/worst-case latency for end-to-end flows considering
      execution times and sampling delays.
    status: implemented
    tags: [analysis, latency]

  - id: REQ-ANALYSIS-004
    type: requirement
    title: Resource budget analysis
    description: >
      Validate memory budgets and bandwidth budgets against capacity.
    status: implemented
    tags: [analysis, resource]

  - id: REQ-ANALYSIS-005
    type: requirement
    title: EMV2 fault tree analysis
    description: >
      Build structural fault trees from error model annotations.
      Detect single-point-of-failure via minimal cut sets.
    status: implemented
    tags: [analysis, safety, emv2]

  - id: REQ-ANALYSIS-006
    type: requirement
    title: ARINC 653 partition scheduling
    description: >
      Validate partition window scheduling, inter-partition communication,
      and process-to-partition bindings per ARINC 653.
    status: implemented
    tags: [analysis, arinc653]

  - id: REQ-ANALYSIS-007
    type: requirement
    title: Legality rules (AS5506 naming and well-formedness)
    description: >
      Enforce AADL naming rules, category restrictions, direction rules,
      connection rules, flow rules, binding rules, mode rules, and
      subcomponent rules. Target 50+ rules.
    status: partial
    tags: [analysis, legality]

  - id: REQ-ANALYSIS-008
    type: requirement
    title: Classifier type matching on connections
    description: >
      Validate data type compatibility on connections — connected ports
      must have compatible classifiers.
    status: implemented
    tags: [analysis, legality]

  - id: REQ-ANALYSIS-009
    type: requirement
    title: Mode reachability analysis and NuSMV export
    description: >
      Compute mode reachability matrix, detect unreachable modes,
      detect dead transitions (trigger ports not connected), and export
      NuSMV (.smv) models for external model checking.
    status: implemented
    tags: [analysis, modes, as5506-ch12]

  # ── Serialization & Integration ────────────────────────────────────────

  - id: REQ-SERDE-001
    type: requirement
    title: JSON serialization of all public types
    description: >
      Derive Serialize/Deserialize on all spar-hir public types.
      Support --format json on CLI commands.
    status: implemented
    tags: [integration, serde]

  # ── Rendering (STPA-derived) ──────────────────────────────────────────

  - id: RENDER-REQ-001
    type: requirement
    title: Orthogonal edge routing
    description: >
      Edges must use orthogonal routing to minimize visual crossings.
    status: implemented
    tags: [rendering, stpa]

  - id: RENDER-REQ-002
    type: requirement
    title: Port visibility with directional indicators
    description: >
      Ports must be visible with directional indicators and type coloring.
    status: implemented
    tags: [rendering, stpa]

  - id: RENDER-REQ-003
    type: requirement
    title: Interactive HTML with zoom/pan/minimap/search
    description: >
      Interactive HTML output must support zoom, pan, minimap, and search.
    status: implemented
    tags: [rendering, stpa]

  - id: RENDER-REQ-004
    type: requirement
    title: Deterministic layout
    description: >
      Layout must be deterministic — same model always produces same layout.
    status: implemented
    tags: [rendering, stpa]

  - id: RENDER-REQ-005
    type: requirement
    title: Selection and group highlighting
    description: >
      Selection and group highlighting must be supported in interactive mode.
    status: implemented
    tags: [rendering, stpa]

  - id: RENDER-REQ-006
    type: requirement
    title: Semantic zoom for overview levels
    description: >
      Semantic zoom must reduce clutter at overview levels.
    status: partial
    tags: [rendering, stpa]

  - id: REQ-WASM-001
    type: requirement
    title: WASM component target
    description: >
      Compile spar to wasm32-wasip2. Export adapter and renderer
      interfaces via WIT.
    status: implemented
    tags: [integration, wasm]

  - id: REQ-LSP-001
    type: requirement
    title: Language Server Protocol support
    description: >
      LSP server with diagnostics, hover, completion, go-to-definition,
      code actions, formatting, rename, and inlay hints.
    status: implemented
    tags: [tooling, lsp]

  # ── Transform ──────────────────────────────────────────────────────────

  - id: REQ-TRANSFORM-001
    type: requirement
    title: WIT to AADL transform
    description: >
      Bidirectional transform between WebAssembly Interface Types
      and AADL component declarations.
    status: implemented
    tags: [transform, wit]

  - id: REQ-TRANSFORM-002
    type: requirement
    title: Rust crate introspection
    description: >
      Import cargo metadata to generate virtual AADL packages
      representing Rust crate architecture.
    status: planned
    tags: [transform, rust]

  - id: REQ-TRANSFORM-003
    type: requirement
    title: WAC composition to AADL
    description: >
      Read WAC composition files and generate AADL system
      implementations with subcomponents and connections.
    status: planned
    tags: [transform, wac]

  - id: REQ-TRANSFORM-004
    type: requirement
    title: wRPC transport modeling
    description: >
      Map wRPC transports (NATS, TCP, QUIC) to AADL bus components
      with deployment bindings.
    status: planned
    tags: [transform, wrpc]

  - id: REQ-TRANSFORM-005
    type: requirement
    title: WASI P3 async mapping
    description: >
      Map WASI P3 async functions, streams, and futures to AADL
      thread components with scheduling properties.
    status: planned
    tags: [transform, wasi-p3]

  # ── STPA Analysis Coverage Records (STPA-REQ-022) ────────────────

  - id: COVERAGE-CH4
    type: requirement
    title: "AS5506 Ch.4: Components — containment rules"
    description: >
      hierarchy.rs validates all 14 category containment rules per
      section 4.5. naming_rules.rs checks naming legality.
    status: implemented
    links:
      - type: satisfies
        target: REQ-MODEL-001
      - type: satisfies
        target: REQ-MODEL-002
      - type: satisfies
        target: REQ-ANALYSIS-007

  - id: COVERAGE-CH5
    type: requirement
    title: "AS5506 Ch.5: Flows — end-to-end flow analysis"
    description: >
      flow_check.rs validates flow path continuity. flow_rules.rs checks
      flow spec legality. latency.rs computes best/worst-case latency.
    status: implemented
    links:
      - type: satisfies
        target: REQ-ANALYSIS-003
      - type: satisfies
        target: REQ-ANALYSIS-007

  - id: COVERAGE-CH8
    type: requirement
    title: "AS5506 Ch.8: Features — direction and type rules"
    description: >
      direction_rules.rs validates port direction compatibility.
      classifier_match.rs validates data type compatibility on connections.
    status: implemented
    links:
      - type: satisfies
        target: REQ-MODEL-003
      - type: satisfies
        target: REQ-ANALYSIS-008

  - id: COVERAGE-CH9
    type: requirement
    title: "AS5506 Ch.9: Connections — well-formedness rules"
    description: >
      connection_rules.rs validates connection endpoint compatibility.
      connectivity.rs checks for unconnected required ports.
    status: implemented
    links:
      - type: satisfies
        target: REQ-MODEL-004
      - type: satisfies
        target: REQ-ANALYSIS-001

  - id: COVERAGE-CH10
    type: requirement
    title: "AS5506 Ch.10: Modes — mode completeness and transitions"
    description: >
      mode_check.rs validates initial mode presence and uniqueness.
      mode_rules.rs checks mode transition legality. modal_rules.rs
      validates in_modes references.
    status: implemented
    links:
      - type: satisfies
        target: REQ-ANALYSIS-007

  - id: COVERAGE-CH11
    type: requirement
    title: "AS5506 Ch.11: Properties — type validation and evaluation"
    description: >
      property_rules.rs validates property applicability and types.
      property_accessors.rs provides typed access with unit conversion.
    status: implemented
    links:
      - type: satisfies
        target: REQ-PROP-001
      - type: satisfies
        target: REQ-PROP-002
      - type: satisfies
        target: REQ-PROP-003

  - id: COVERAGE-CH12
    type: requirement
    title: "AS5506 Ch.12: System Operation Modes"
    description: >
      modal.rs computes SOMs. Scheduling and latency analyses evaluate
      per-SOM when modal property associations exist.
    status: partial
    links:
      - type: satisfies
        target: REQ-INST-004

  - id: COVERAGE-CH13
    type: requirement
    title: "AS5506 Ch.13: ARINC 653 partition scheduling"
    description: >
      arinc653.rs validates partition window scheduling, inter-partition
      communication isolation, and process-to-partition bindings.
    status: implemented
    links:
      - type: satisfies
        target: REQ-ANALYSIS-006

  - id: COVERAGE-CH14
    type: requirement
    title: "AS5506 Ch.14: Instance model construction"
    description: >
      instance.rs handles recursive instantiation, array expansion,
      semantic connection tracing, and circular containment detection.
    status: implemented
    links:
      - type: satisfies
        target: REQ-INST-001
      - type: satisfies
        target: REQ-INST-002
      - type: satisfies
        target: REQ-INST-003

  - id: COVERAGE-GAPS
    type: requirement
    title: Known analysis gaps
    description: >
      Not yet covered: Ch.7 (prototypes — parsed but not analyzed).
      Ch.6 type extensions now resolved via extends chain walking (v0.5.0).
      Property expression evaluation now covered by text fallback parser (v0.5.0).
    status: partial
    links:
      - type: satisfies
        target: REQ-MODEL-005
      - type: satisfies
        target: REQ-PROP-002

  # ── v0.3.0 Requirements ─────────────────────────────────────────────────

  # ── Analysis Enhancements ────────────────────────────────────────────

  - id: REQ-RTA-001
    type: requirement
    title: RTA per-thread response time with deadline checking
    description: >
      Response Time Analysis computes per-thread worst-case response times
      under fixed-priority preemptive scheduling, accounting for higher-priority
      interference and blocking. Reports deadline misses when WCRT exceeds
      Deadline property. Supports multi-processor configurations.
    status: implemented
    tags: [analysis, scheduling, v030]

  - id: REQ-BUS-001
    type: requirement
    title: Bus bandwidth utilization analysis
    description: >
      Compute aggregate bandwidth demand on each bus instance from bound
      connections and compare against the bus Bandwidth_Capacity property.
      Report overload when demand exceeds capacity.
    status: implemented
    tags: [analysis, resource, v030]

  - id: REQ-MEMBUD-001
    type: requirement
    title: Memory budget analysis (Code_Size + Data_Size vs Memory_Size)
    description: >
      For each memory component, sum Code_Size and Data_Size properties of
      all software components bound to it and compare against Memory_Size.
      Report budget violations with utilization percentage.
    status: implemented
    tags: [analysis, resource, v030]

  - id: REQ-WEIGHTPOWER-001
    type: requirement
    title: Weight/power property aggregation up hierarchy
    description: >
      Aggregate SEI::GrossWeight and SEI::PowerBudget properties upward
      through the component hierarchy. Report when aggregate exceeds
      the capacity declared on the parent component.
    status: implemented
    tags: [analysis, resource, v030]

  # ── Parser Enhancements ──────────────────────────────────────────────

  - id: REQ-PARSER-001
    type: requirement
    title: AADL v2.3 syntax acceptance
    description: >
      Extend the parser to accept AADL v2.3 syntax additions while
      maintaining backward compatibility with v2.2. New constructs
      include updated property syntax and classifier enhancements.
    status: implemented
    tags: [parsing, as5506, v030]

  # ── Property Verification ────────────────────────────────────────────

  - id: REQ-VERIFY-001
    type: requirement
    title: Property assertion rules in spar verify
    description: >
      A DSL for declaring assertions over HIR instance model properties.
      Users specify constraints (e.g., all threads must have Period set,
      latency < 100ms) and spar verify evaluates them, reporting pass/fail
      with evidence.
    status: implemented
    tags: [verification, properties, v030]

  # ── Structural Diff ──────────────────────────────────────────────────

  - id: REQ-DIFF-001
    type: requirement
    title: Git-aware structural diff with analysis impact comparison
    description: >
      Compare two revisions of an AADL model structurally (added/removed/
      changed components, connections, properties) and diff their analysis
      results to show impact of changes on scheduling, latency, etc.
    status: implemented
    tags: [diff, git, v030]

  - id: REQ-DIFF-002
    type: requirement
    title: SARIF output for GitHub Code Scanning integration
    description: >
      Export analysis diagnostics and diff results in SARIF format for
      integration with GitHub Code Scanning, enabling architectural
      findings as code review annotations.
    status: implemented
    tags: [diff, sarif, integration, v030]

  - id: REQ-DIFF-003
    type: requirement
    title: Three-way merge architectural conflict detection
    description: >
      Detect architectural conflicts in three-way merges where concurrent
      changes affect the same structural elements (components, connections,
      bindings) or produce incompatible analysis results.
    status: planned
    tags: [diff, merge, v040]

  # ── MCP Server ───────────────────────────────────────────────────────

  - id: REQ-MCP-001
    type: requirement
    title: MCP server exposing analysis tools and model resources
    description: >
      Model Context Protocol server running as a spar CLI subcommand,
      exposing AADL analysis passes as MCP tools and instance model
      elements as MCP resources over stdio JSON-RPC transport.
    status: planned
    tags: [mcp, integration, v040]

  # ── Query Language ───────────────────────────────────────────────────

  - id: REQ-QUERY-001
    type: requirement
    title: Path-expression query language over instance model
    description: >
      A query language using path expressions (e.g., components.where(
      category == thread).property(Period)) to select and filter instance
      model elements. Supports predicate filtering, property extraction,
      and aggregation.
    status: planned
    tags: [query, instance, v040]

  # ── Deployment Solver (v0.4.0+) ──────────────────────────────────────

  - id: REQ-SOLVER-001
    type: requirement
    title: Hardware topology graph extraction
    description: >
      Extract a petgraph from the AADL instance model representing the
      hardware topology: processors as nodes, buses as edges, with capacity
      properties (CPU budget, memory size, bus bandwidth). Serves as the
      target graph for deployment optimization.
    status: implemented
    tags: [solver, topology, v030]

  - id: REQ-SOLVER-002
    type: requirement
    title: Virtual bus library (communication protocol catalog)
    description: >
      AADL package library defining virtual bus types for common protocols:
      DDS, SOME/IP, shared memory, CAN, CAN FD, Ethernet, AFDX, SpaceWire,
      PROFINET, EtherCAT, MAVLink. Each includes latency overhead, bandwidth,
      max payload, security profile, and bus type compatibility properties.
    status: implemented
    tags: [solver, protocol, v030]

  - id: REQ-SOLVER-003
    type: requirement
    title: Constraint formulation from AADL properties
    description: >
      Translate AADL model properties into solver constraints: timing
      (Period, Deadline, WCET → scheduling feasibility), safety (ASIL/DAL
      → partition isolation), security (trust zones → encryption overhead),
      resources (memory/CPU/bandwidth budgets), physical (bus connectivity).
    status: implemented
    tags: [solver, constraints, v030]

  - id: REQ-SOLVER-004
    type: requirement
    title: Hierarchical deployment solving (NDS-layered)
    description: >
      Solve deployment in hierarchical layers analogous to NDS navigation:
      Layer 0 (Component) — schedule threads within one processor (RTA).
      Layer 1 (Cluster) — allocate processes to processors within a
      subsystem (bin packing + schedulability). Layer 2 (System) — allocate
      subsystems to hardware zones (topology + bandwidth + safety). Layer 3
      (Global) — optimize across all zones (E2E latency, safety decomposition,
      cost). Local solutions compose into globally valid configurations.
    status: planned
    tags: [solver, optimization, v040]

  - id: REQ-SOLVER-005
    type: requirement
    title: Optimality certificates for deployment solutions
    description: >
      Deployment solver returns not just a valid configuration but a
      machine-checkable certificate proving it is globally optimal (for
      exact methods) or within a bounded optimality gap (for heuristics).
      Uses dual bounds from MILP or exhaustive search proofs from CP-SAT.
    status: planned
    tags: [solver, verification, v040]

  - id: REQ-SOLVER-006
    type: requirement
    title: Multi-objective Pareto front computation
    description: >
      For conflicting objectives (minimize latency vs minimize cost vs
      maximize safety margins), compute the Pareto front of non-dominated
      solutions. Present to the engineer for interactive selection. Support
      both exact Pareto (small problems) and approximate (NSGA-II for large).
    status: planned
    tags: [solver, optimization, v040]

  - id: REQ-SOLVER-007
    type: requirement
    title: Source rewriting to apply deployment solutions
    description: >
      Apply solver output by rewriting AADL source via rowan CST
      manipulation. Insert/update Actual_Processor_Binding, Actual_Memory_Binding,
      Actual_Connection_Binding properties. Preserve formatting and comments.
      Validate incrementally via salsa after each change.
    status: implemented
    tags: [solver, refactoring, v030]

  - id: REQ-SOLVER-008
    type: requirement
    title: Safety decomposition validation (ASIL/DAL/SIL)
    description: >
      Validate that ASIL decomposition rules are satisfied in the deployment:
      decomposed requirements are allocated to sufficiently independent elements,
      freedom from interference is ensured (spatial via MMU, temporal via
      scheduling, communication via controlled interfaces). Supports ISO 26262
      ASIL, DO-178C DAL, and IEC 61508 SIL.
    status: planned
    tags: [solver, safety, v040]

  - id: REQ-SOLVER-009
    type: requirement
    title: Security zone and conduit validation
    description: >
      Model IEC 62443 / ISO 21434 security zones as AADL system components
      with security-level properties. Validate that cross-zone connections
      have appropriate protection (encryption, authentication). Account for
      security overhead (TLS latency, MAC computation) in timing analysis.
    status: planned
    tags: [solver, security, v040]

  # ── Competitive Gap Requirements (v0.4.0+) ─────────────────────────

  - id: REQ-CODEGEN-001
    type: requirement
    title: Code skeleton generation (Rust + WIT)
    description: >
      Generate deployable code from AADL component implementations.
      Dual output: WIT interfaces (component contracts) + Rust crate
      skeletons (implementation). Process → crate, thread → async fn,
      data type → struct, port → typed channel / WIT stream.
    status: planned
    tags: [codegen, competitive-gap, v040]
    links:
      - type: traces-to
        target: REQ-TRANSFORM-001

  - id: REQ-CODEGEN-WIT
    type: requirement
    title: Generate WIT interfaces from AADL processes
    description: >
      Each AADL process generates a WIT world with interfaces for its
      features. Data ports → WIT stream<T>, event ports → WIT future,
      subprogram access → WIT functions. wit-bindgen runs as Bazel build
      action (not proc macro) producing plain Rust bindings.
    status: planned
    tags: [codegen, wit, v040]
    links:
      - type: traces-to
        target: REQ-CODEGEN-001

  - id: REQ-CODEGEN-RUST
    type: requirement
    title: Generate Rust crate skeletons from AADL
    description: >
      Each AADL process generates a Cargo crate with: lib.rs (trait impl
      skeleton), ports.rs (typed channels), types.rs (data structs),
      config.rs (#[aadl(...)] scheduling attributes). System generates
      Cargo workspace. Both native and WASM component targets.
    status: planned
    tags: [codegen, rust, v040]
    links:
      - type: traces-to
        target: REQ-CODEGEN-001

  - id: REQ-CODEGEN-BAZEL
    type: requirement
    title: Generate Bazel BUILD files for WASM + verification
    description: >
      Generated workspace includes BUILD.bazel for hermetic builds:
      rules_wasm_component (WIT → bindgen → compile → .wasm),
      rules_verus (SMT checking), rules_lean (proof checking),
      rules_kani (bounded model checking). Cargo.toml also generated
      for development iteration.
    status: planned
    tags: [codegen, bazel, v040]
    links:
      - type: traces-to
        target: REQ-CODEGEN-001

  - id: REQ-CODEGEN-VERIFY-BUILD
    type: requirement
    title: Build-time AADL attribute verification
    description: >
      Generated #[aadl(period_ps=N, deadline_ps=N, ...)] attributes
      checked against AADL model at build time. Proc macro (Cargo) or
