  # ── TSN/Ethernet WCTT analysis (Track D, v0.8.0) ───────────────────

  - id: REQ-NETWORK-001
    type: requirement
    title: Network switch modeling via Switch_Type discriminator
    description: >
      System shall support modeling of network switch components via
      Spar_Network::Switch_Type discriminator. Switches are modeled as
      `bus implementation` (Option C from PR #152 research) carrying the
      Switch_Type enumeration (FIFO, Priority, TSN); Phase 1 covers FIFO
      and Priority disciplines, Phase 2 introduces TSN-specific service
      curves under a separate Spar_TSN property set.
    status: planned
    tags: [network, wctt, tsn, v080]

  - id: REQ-NETWORK-002
    type: requirement
    title: Per-bus queue depth and forwarding latency
    description: >
      System shall support modeling of per-bus queue depth and
      store-and-forward latency. Exposed via Spar_Network::Queue_Depth
      (aadlinteger; per-port frame capacity) and
      Spar_Network::Forwarding_Latency (Time_Range; per-hop BCET..WCET
      switch-fabric/MAC contribution). Both feed the WCTT analysis
      pass that lands later in Track D.
    status: planned
    tags: [network, wctt, v080]

  - id: REQ-NETWORK-003
    type: requirement
    title: Per-port output rate (egress bandwidth)
    description: >
      System shall support modeling of per-port output rate (egress
      bandwidth). Exposed via Spar_Network::Output_Rate (Data_Rate;
      applies to bus and port). Distinct from
      Communication_Properties::Output_Rate, which is a producer-side
      Rate_Spec; Spar_Network::Output_Rate is the link/port egress
      bandwidth used by the WCTT serialization-time term.
    status: planned
    tags: [network, wctt, v080]

  # ── Track E: hypothetical-rebinding oracle (v0.8.0) ────────────────

  - id: REQ-MIGRATION-001
    type: requirement
    title: Frozen-platform component annotation
    description: >
      System shall support marking components as frozen (platform) via
      Spar_Migration::Frozen (aadlboolean). Frozen items are platform —
      their binding/properties cannot be altered by hypothetical-rebinding
      queries. Default false (unannotated components are eligible for
      rebinding). Per Track E commit 1/8 of the v0.8.0 migration design
      research (docs/designs/track-e-migration-research.md §6.1).
    status: planned
    tags: [migration, track-e, v080]

  - id: REQ-MIGRATION-002
    type: requirement
    title: Mobile-application component annotation with allowed targets
    description: >
      System shall support marking components as mobile (application) via
      Spar_Migration::Mobile (aadlboolean), with optional Allowed_Targets
      (list of reference) enumeration restricting valid hypothetical
      rebinding destinations. Empty Allowed_Targets means "no restriction
      beyond the platform's frozen set". When both Frozen=true and
      Mobile=true are declared on the same item, Frozen wins (defensive
      — refuse to rebind). Per §6.1 of the v0.8.0 migration design.
    status: planned
    tags: [migration, track-e, v080]

  - id: REQ-MIGRATION-003
    type: requirement
    title: Pinned-reason audit metadata
    description: >
      System shall record human-readable Pinned_Reason for frozen items
      as audit metadata. Exposed via Spar_Migration::Pinned_Reason
      (aadlstring). Captures the rationale a reviewer would need to
      certify why an item is platform (e.g., "ASIL-D platform partition",
      "RTOS kernel image"). Per §6.1 of the v0.8.0 migration design.
    status: planned
    tags: [migration, track-e, v080, audit]

  - id: REQ-MIGRATION-004
    type: requirement
    title: Hypothetical-binding overlay over a SystemInstance
    description: >
      System shall support hypothetical-binding overlays that allow any
      analysis to run on a tentative rebinding without mutating the
      SystemInstance. The overlay maps component instance indices to
      hypothetical target processor indices and is consulted in place
      of the declared Actual_Processor_Binding when present; absent
      entries fall through to the declared binding. The overlay
      validates against Spar_Migration::Frozen (refuses to move
      platform components) and Spar_Migration::Allowed_Targets
      (refuses targets outside the declared set when the list is
      non-empty), returning structured FrozenViolation /
      AllowedTargetsViolation diagnostics. An empty overlay is the
      identity (non-regression baseline). Load-bearing infrastructure
      for spar moves verify (Track E commit 3) and spar moves
      enumerate (Track E commits 4-5). Per Track E commit 2/8 of the
      v0.8.0 migration design research (§6.4).
    status: planned
    tags: [migration, track-e, v080]

  - id: REQ-NETWORK-004
    type: requirement
    title: Typed network graph extraction from a SystemInstance
    description: >
      System shall extract a typed network graph (nodes + links) from
      a SystemInstance for downstream WCTT analysis. Nodes classify as
      switches (bus components carrying Spar_Network::Switch_Type) or
      end stations (devices/processors connected to a switched bus);
      links carry the per-hop bandwidth, forwarding-latency range, and
      queue-depth annotations from Spar_Network::*. The graph is the
      bridge between the AADL ItemTree and the Network Calculus
      primitives that follow in subsequent Track D commits.
    status: planned
    tags: [network, wctt, v080]

  - id: REQ-NETWORK-005
    type: requirement
    title: Network Calculus arrival/service curve primitives and operators
    description: >
      System shall provide Network Calculus arrival/service-curve
      primitives plus the closed-form min-plus operations (backlog
      bound, delay bound, residual service, output bound) needed by
      the WCTT analysis pass. Curves cover the affine "leaky bucket"
      arrival form (burst + sustained rate, optional peak) and the
      rate-latency service form, with all values represented as u64
      picoseconds / bytes / bits per second so the kernel is free of
      floating-point drift. The piecewise-affine extension and TSN-
      specific service curves are deferred to v0.8.x. Track D commit 3
      of the v0.8.0 design (docs/designs/track-d-tsn-wctt-research.md
      §4.3-4.4).
    status: planned
    tags: [network, wctt, v080]

  - id: REQ-NETWORK-006
    type: requirement
    title: Per-stream end-to-end WCTT analysis pass
    description: >
      System shall compute per-stream end-to-end WCTT bounds across
      switched-bus topologies via the NC primitives. The wctt analysis
      pass extracts the network graph (REQ-NETWORK-004), discovers
      AADL data-port streams whose Actual_Connection_Binding traverses
      one or more switched buses, and composes per-hop residual
      service / delay / output bounds (REQ-NETWORK-005) into an
      end-to-end traversal-time bound for each stream. Phase 1 covers
      FIFO + Priority switches with classical residual-service splits;
      TSN-shaped service curves (TAS / CBS / preemption) are deferred
      to Phase 2. New diagnostic kinds: WcttBound (Info per stream),
      WcttExceedsBudget (Error when Spar_Network::WCTT_Budget is set
      and exceeded), WcttUnservable (Error when competing flows
      exhaust server rate), WcttSwitchOverloaded (Error when port
      utilisation > 100%), WcttDeferred (Info note for TSN switches).
      Track D commit 4 of the v0.8.0 design
      (docs/designs/track-d-tsn-wctt-research.md §5.4).
    status: planned
    tags: [network, wctt, v080]

  # ── Track B: rivet ↔ spar variant binding (v0.7.x) ─────────────────

  - id: REQ-VARIANT-001
    type: requirement
    title: Consume rivet's variant context blob (v1) and filter HIR
    description: >
      System shall consume rivet's variant context blob (v1 contract per
      docs/contracts/rivet-spar-variant-v1.md) and filter HIR items by
      intersection-semantics binding rules. The reader strictly accepts
      rivet_spar_context_version "1" only — v2+ blobs are refused per
      the contract's compatibility section. File-scoped (artifact) and
      symbol-scoped bindings are honoured; an item is kept iff every
      matching binding has its requires-set satisfied by the variant's
      active features. Items with no matching binding are kept
      unconditionally as variant-independent infrastructure.
    status: planned
    tags: [variants, track-b, v07x]

  # ── PIP/PCP blocking term in hierarchical RTA (v0.7.1) ─────────────

  - id: REQ-TIMING-PIP-001
    type: requirement
    title: PCP/PIP blocking analysis in hierarchical RTA
    description: >
      System shall support PCP/PIP blocking analysis. Threads declaring
      Thread_Properties::Locking_Protocol => Priority_Inheritance_Protocol
      or Priority_Ceiling_Protocol contribute a blocking term B_i to the
      v0.7.0 hierarchical IRQ-aware RTA recurrence (Joseph & Pandya 1986;
      Buttazzo, *Hard Real-Time Computing Systems*). The blocking-term
      magnitude is read from the new Spar_Timing::Critical_Section_Blocking
      property (Time, picoseconds) and represents the user's bound on how
      long a higher-priority task can be blocked by lower-priority tasks
      holding shared resources. Stop_For_Lock and None values opt out of
      blocking analysis (B_i = 0). Scope is the simple-ceiling case;
      per-resource blocking analysis with shared-resource declarations is
      deferred to v0.8.0+. Discharges the v0.7.1 follow-up explicitly
      carved out of #147 / #149.
    status: implemented
    tags: [timing, rta, pip, pcp, blocking, v071]

