# Spar verification measures — maps to test suites

artifacts:

  - id: TEST-PARSER
    type: feature
    title: Parser unit tests
    description: Test all AADL syntax constructs parse correctly with error recovery.
    fields:
      method: automated-test
      steps:
        - run: cargo test -p spar-parser
    links:
      - type: satisfies
        target: ARCH-PARSER

  - id: TEST-SYNTAX
    type: feature
    title: Syntax tree unit tests
    fields:
      method: automated-test
      steps:
        - run: cargo test -p spar-syntax
    links:
      - type: satisfies
        target: ARCH-SYNTAX

  - id: TEST-HIR-DEF
    type: feature
    title: HIR definition unit tests
    description: >
      Tests for ItemTree lowering, instance model construction,
      name resolution, and standard property definitions.
    fields:
      method: automated-test
      steps:
        - run: cargo test -p spar-hir-def
    links:
      - type: satisfies
        target: ARCH-HIR-DEF

  - id: TEST-HIR
    type: feature
    title: HIR facade unit tests
    description: Tests for public API, serde round-trips, and Database queries.
    fields:
      method: automated-test
      steps:
        - run: cargo test -p spar-hir
    links:
      - type: satisfies
        target: ARCH-HIR

  - id: TEST-ANALYSIS
    type: feature
    title: Analysis pass unit tests
    description: >
      Tests for all 19+ analysis passes including connectivity, scheduling,
      latency, resource budget, EMV2, ARINC 653, legality, and classifier matching.
    fields:
      method: automated-test
      steps:
        - run: cargo test -p spar-analysis
    links:
      - type: satisfies
        target: ARCH-ANALYSIS

  - id: TEST-TRANSFORM
    type: feature
    title: Transform unit tests
    description: WIT-to-AADL and AADL-to-WIT round-trip tests.
    fields:
      method: automated-test
      steps:
        - run: cargo test -p spar-transform
    links:
      - type: satisfies
        target: ARCH-TRANSFORM

  - id: TEST-CLI
    type: feature
    title: CLI integration tests
    description: >
      End-to-end tests for CLI subcommands including LSP, format output,
      code actions, rename, and formatting.
    fields:
      method: automated-test
      steps:
        - run: cargo test -p spar-cli
    links:
      - type: satisfies
        target: ARCH-CLI

  - id: TEST-WASM
    type: feature
    title: WASM component tests
    description: >
      Unit and integration tests for the WASM component including
      render and analyze functions.
    fields:
      method: automated-test
      steps:
        - run: cargo test -p spar-wasm
    links:
      - type: satisfies
        target: ARCH-WASM

  - id: TEST-WORKSPACE
    type: feature
    title: Full workspace test suite
    description: Run all tests across all 10 crates (962+ tests).
    fields:
      method: automated-test
      steps:
        - run: cargo test --workspace
    links:
      - type: satisfies
        target: REQ-PARSE-001
      - type: satisfies
        target: REQ-MODEL-001
      - type: satisfies
        target: REQ-INST-001
      - type: satisfies
        target: REQ-ANALYSIS-001
      - type: satisfies
        target: REQ-SERDE-001

  - id: TEST-WASM-BUILD
    type: feature
    title: WASM compilation verification
    description: Verify spar-wasm compiles to wasm32-wasip2 target.
    fields:
      method: automated-test
      steps:
        - run: cargo build --target wasm32-wasip2 -p spar-wasm --release
    links:
      - type: satisfies
        target: REQ-WASM-001

  # ── STPA Safety Verification ───────────────────────────────────────

  - id: TEST-STPA-PARSER-ERRORS
    type: feature
    title: Parser error diagnostic tests (STPA-REQ-001)
    description: >
      Seven tests verifying the parser emits error diagnostics for
      unrecognized syntax. Covers: missing semicolons, unknown keywords,
      incomplete declarations, malformed feature groups, invalid property
      associations, garbage input, and unterminated string literals.
    fields:
      method: automated-test
      steps:
        - run: cargo test -p spar-syntax -- error
    links:
      - type: satisfies
        target: STPA-REQ-001

  - id: TEST-STPA-PARSER-COVERAGE
    type: feature
    title: Parser production coverage tests (STPA-REQ-003)
    description: >
      Thirty-five tests covering AADL grammar productions including
      feature groups, annex subclauses, property expressions, prototypes,
      renames, call sequences, virtual types, refinements, and more.
      Each test parses a dedicated .aadl fixture file and verifies the
      CST structure.
    fields:
      method: automated-test
      steps:
        - run: cargo test -p spar-syntax -- production_
    links:
      - type: satisfies
        target: STPA-REQ-003

  - id: TEST-STPA-IN-MODES
    type: feature
    title: Modal metadata preservation tests (STPA-REQ-008)
    description: >
      Tests verifying in_modes metadata survives instantiation on both
      ComponentInstance and ConnectionInstance.
    fields:
      method: automated-test
      steps:
        - run: cargo test -p spar-analysis -- regression_in_modes
    links:
      - type: satisfies
        target: STPA-REQ-008

  - id: TEST-STPA-UNRESOLVED
    type: feature
    title: Unresolved connection endpoint tests (STPA-REQ-013)
    description: >
      Tests verifying compute_semantic_connections emits diagnostics
      when connection endpoints cannot be resolved.
    fields:
      method: automated-test
      steps:
        - run: cargo test -p spar-hir-def -- semantic_connection
    links:
      - type: satisfies
        target: STPA-REQ-013

  - id: TEST-STPA-SVG-TOPOLOGY
    type: feature
    title: SVG topology verification tests (STPA-REQ-021)
    description: >
      Eight tests verifying SVG graph output contains correct number of
      nodes and edges matching the instance model, with proper labels
      and connection endpoints.
    fields:
      method: automated-test
      steps:
        - run: cargo test -p spar-wasm -- topology
    links:
      - type: satisfies
        target: STPA-REQ-021

  - id: TEST-STPA-REGRESSION
    type: feature
    title: Regression test suite (STPA-REQ-023)
    description: >
      Six seed regression tests covering past bugs: intentionally
      unconnected ports, invalid containment, modal metadata on
      components and connections, duplicate initial modes, and analysis
      registration completeness.
    fields:
      method: automated-test
      steps:
        - run: cargo test -p spar-analysis -- regression_
    links:
      - type: satisfies
        target: STPA-REQ-023

  - id: VERIFY-STPA-SEVERITY-DOCS
    type: feature
    title: Severity rationale documentation (STPA-REQ-016)
    description: >
      All 21 analysis modules contain severity rationale comment blocks
      in their analyze() methods documenting Error/Warning/Info criteria.
    fields:
      method: inspection
      steps:
        - run: "grep -r 'Severity rationale' crates/spar-analysis/src/ | wc -l"
        - expected: "22 (21 modules + 1 legality)"
    links:
      - type: satisfies
        target: STPA-REQ-016

  - id: VERIFY-STPA-COVERAGE
    type: feature
    title: Analysis coverage tracking (STPA-REQ-022)
    description: >
      Analysis coverage is tracked via rivet artifact linking: coverage
      records in artifacts/requirements.yaml link AS5506 chapters to
      implemented analysis rules, and rivet validate/coverage commands
      check completeness.
    fields:
      method: inspection
      steps:
        - run: rivet coverage --from stpa-coverage --to requirement
    links:
      - type: satisfies
        target: STPA-REQ-022

  - id: TEST-MODE-REACHABILITY
    type: feature
    title: Mode reachability analysis and NuSMV export tests
    description: >
      16 tests covering reachability matrix computation (linear chains,
      cycles, multi-component), unreachable mode detection, dead transition
      detection, NuSMV export formatting, and Analysis trait integration.
    fields:
      method: automated-test
      steps:
        - run: cargo test -p spar-analysis -- mode_reachability
    links:
      - type: satisfies
        target: REQ-ANALYSIS-009

  # ── Rendering Quality Verification ───────────────────────────────────

  - id: VAL-R1
    type: feature
    status: implemented
    verifies: [RENDER-REQ-004]
    title: Layout determinism tests (RENDER-REQ-004)
    description: >
      Tests verifying that the same AADL model always produces the same
      layout output. Covers node positions, edge routes, and port placement
      across repeated runs.
    fields:
      method: automated-test
      steps:
        - run: cargo test -p spar-wasm -- layout_is_deterministic
    links:
      - type: satisfies
        target: RENDER-REQ-004
      - type: satisfies
        target: ARCH-R4

  - id: VAL-R2
    type: feature
    status: implemented
    verifies: [RENDER-REQ-001]
    title: Orthogonal routing tests (RENDER-REQ-001)
    description: >
      Tests verifying that edge routing produces orthogonal (rectilinear)
      paths with minimized crossings and obstacle avoidance around
      component boxes.
    fields:
      method: automated-test
      steps:
        - run: cargo test -p spar-wasm -- orthogonal_routing
    links:
      - type: satisfies
        target: RENDER-REQ-001
      - type: satisfies
        target: ARCH-R2

  - id: VAL-R3
    type: feature
    status: implemented
    verifies: [RENDER-REQ-002]
    title: Port positioning tests (RENDER-REQ-002)
    description: >
      Tests verifying that ports are rendered with correct side placement,
      directional indicators, and type-based coloring on component
      boundaries.
    fields:
      method: automated-test
      steps:
        - run: cargo test -p spar-wasm -- port_positioning
    links:
      - type: satisfies
        target: RENDER-REQ-002
      - type: satisfies
        target: ARCH-R1

  - id: VAL-R4
    type: feature
    status: implemented
    verifies: [RENDER-REQ-003, RENDER-REQ-005]
    title: HTML interactive feature tests (RENDER-REQ-003, RENDER-REQ-005)
    description: >
      Tests verifying the interactive HTML output supports zoom, pan,
      minimap, search, and selection/highlighting of components and
      connections.
    fields:
      method: automated-test
      steps:
        - run: cargo test -p spar-wasm -- html_interactive
    links:
      - type: satisfies
        target: RENDER-REQ-003
      - type: satisfies
        target: RENDER-REQ-005
      - type: satisfies
        target: ARCH-R3

  - id: VAL-R5
    type: feature
    status: implemented
    verifies: [RENDER-REQ-006]
    title: Semantic zoom tests (RENDER-REQ-006)
    description: >
      Tests verifying that semantic zoom reduces clutter at overview
      levels by collapsing internal details and showing only component
      boundaries and inter-component connections.
    fields:
      method: automated-test
      steps:
        - run: cargo test -p spar-wasm -- semantic_zoom
    links:
      - type: satisfies
        target: RENDER-REQ-006
      - type: satisfies
        target: ARCH-R4

  # ── v0.3.0 Verification Records ─────────────────────────────────────

  - id: VAL-RTA-001
    type: feature
    status: planned
    title: RTA response time analysis tests
    description: >
      Tests for Response Time Analysis covering deadline miss detection,
      convergence of iterative WCRT computation, multi-processor thread
      grouping, and correct handling of missing Deadline/Period properties.
    fields:
      method: automated-test
      steps:
        - run: cargo test -p spar-analysis -- rta
    links:
      - type: verifies
        target: REQ-RTA-001
      - type: satisfies
        target: ARCH-ANALYSIS-001

  - id: VAL-BUS-001
    type: feature
    status: planned
    title: Bus bandwidth utilization tests
    description: >
      Tests for bus bandwidth analysis covering overload detection when
      aggregate demand exceeds capacity, normal utilization reporting,
      and graceful handling of missing Bandwidth_Capacity properties.
    fields:
      method: automated-test
      steps:
        - run: cargo test -p spar-analysis -- bus_bandwidth
    links:
      - type: verifies
        target: REQ-BUS-001
      - type: satisfies
        target: ARCH-ANALYSIS-001

  - id: VAL-MEMBUD-001
    type: feature
    status: planned
    title: Memory budget analysis tests
    description: >
      Tests for memory budget analysis covering budget violations when
      Code_Size + Data_Size exceeds Memory_Size, normal budget reporting,
      and handling of components with partial or missing size properties.
    fields:
      method: automated-test
      steps:
        - run: cargo test -p spar-analysis -- memory_budget
    links:
      - type: verifies
        target: REQ-MEMBUD-001
      - type: satisfies
        target: ARCH-ANALYSIS-001

  - id: VAL-WEIGHTPOWER-001
    type: feature
    status: planned
    title: Weight/power aggregation tests
    description: >
      Tests for weight and power property aggregation up the component
      hierarchy, verifying correct summation and capacity violation
      detection at each level.
    fields:
      method: automated-test
      steps:
        - run: cargo test -p spar-analysis -- weight_power
    links:
      - type: verifies
        target: REQ-WEIGHTPOWER-001
      - type: satisfies
        target: ARCH-ANALYSIS-001

  - id: VAL-VERIFY-001
    type: feature
    status: planned
    title: Property assertion rule tests
    description: >
      Tests for the property assertion DSL covering passing assertions,
      failing assertions with evidence, assertions referencing analysis
      results, and malformed assertion syntax errors.
    fields:
      method: automated-test
      steps:
        - run: cargo test -p spar-cli -- verify
    links:
      - type: verifies
        target: REQ-VERIFY-001
      - type: satisfies
        target: ARCH-VERIFY-001

  - id: VAL-DIFF-001
    type: feature
    status: planned
    title: Structural diff and analysis impact tests
    description: >
      Tests for git-aware structural diff covering component addition/
      removal detection, property change detection, analysis impact
      comparison between revisions, SARIF output format validation,
      and three-way merge conflict detection.
    fields:
      method: automated-test
      steps:
        - run: cargo test -p spar-cli -- diff
    links:
      - type: verifies
        target: REQ-DIFF-001
      - type: verifies
        target: REQ-DIFF-002
      - type: verifies
        target: REQ-DIFF-003
      - type: satisfies
        target: ARCH-DIFF-001

  - id: VAL-MCP-001
    type: feature
    status: planned
    title: MCP server JSON-RPC request/response tests
    description: >
      Tests for the MCP server covering JSON-RPC initialize handshake,
      tool listing and invocation for analysis passes, resource listing
      and reading for instance model elements, and error handling for
      invalid requests.
    fields:
      method: automated-test
      steps:
        - run: cargo test -p spar-cli -- mcp
    links:
      - type: verifies
        target: REQ-MCP-001
      - type: satisfies
        target: ARCH-MCP-001
