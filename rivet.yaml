project:
  name: spar
  version: "0.6.0"
  description: >
    AADL v2.2/v2.3 toolchain with deployment solver — 16-crate Rust workspace:
    parser, HIR, 27 analyses, LSP (salsa), assertions (rowan), diff, SARIF,
    allocator, SysML v2 lowering, codegen, verify macros.
    Tracks requirements derived from SAE AS5506C, architecture decisions,
    STPA safety analysis, and verification evidence.
  schemas:
    - common
    - dev
    - aspice
    - stpa
    - aadl
    - sysml2

sources:
  - path: artifacts
    format: generic-yaml
  - path: safety/stpa
    format: stpa-yaml
  - path: safety/stpa/requirements.yaml
    format: generic-yaml
  - path: safety/stpa/architecture.yaml
    format: generic-yaml
  - path: safety/stpa/validation.yaml
    format: generic-yaml
  - path: safety/stpa/solver-requirements.yaml
    format: generic-yaml

docs:
  - docs

results: results
