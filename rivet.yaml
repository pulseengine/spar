project:
  name: spar
  version: "0.2.2"
  description: >
    AADL v2.2 toolchain — parser, HIR, analyses, LSP, WASM.
    Tracks requirements derived from SAE AS5506C, architecture decisions,
    STPA safety analysis, and verification evidence.
  schemas:
    - common
    - dev
    - aspice
    - stpa
    - aadl

sources:
  - path: artifacts
    format: generic-yaml
  - path: safety/stpa
    format: stpa-yaml
  - path: safety/stpa/requirements.yaml
    format: generic-yaml
  - path: safety/stpa/architecture.yaml
    format: generic-yaml
  - path: safety/stpa/validation.yaml
    format: generic-yaml

docs:
  - docs

results: results
