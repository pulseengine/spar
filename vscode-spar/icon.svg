<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <rect width="128" height="128" rx="16" fill="#1e1e2e"/>
  <!-- System box -->
  <rect x="14" y="14" width="100" height="100" rx="8" fill="none" stroke="#b3d9ff" stroke-width="2" stroke-dasharray="4 2"/>
  <text x="64" y="30" text-anchor="middle" fill="#b3d9ff" font-family="system-ui" font-size="10" font-weight="bold">AADL</text>
  <!-- Process box -->
  <rect x="24" y="38" width="80" height="30" rx="4" fill="#d4edda" stroke="#333" stroke-width="1.5"/>
  <text x="64" y="57" text-anchor="middle" fill="#222" font-family="system-ui" font-size="11">process</text>
  <!-- Ports -->
  <circle cx="24" cy="53" r="3" fill="#4a90d9" stroke="#333" stroke-width="0.8"/>
  <circle cx="104" cy="53" r="3" fill="#e67e22" stroke="#333" stroke-width="0.8"/>
  <!-- Thread boxes -->
  <rect x="30" y="76" width="28" height="22" rx="3" fill="#fff3cd" stroke="#333" stroke-width="1"/>
  <text x="44" y="90" text-anchor="middle" fill="#222" font-family="system-ui" font-size="8">thread</text>
  <rect x="70" y="76" width="28" height="22" rx="3" fill="#fff3cd" stroke="#333" stroke-width="1"/>
  <text x="84" y="90" text-anchor="middle" fill="#222" font-family="system-ui" font-size="8">thread</text>
  <!-- Connection (orthogonal) -->
  <path d="M 58 87 L 70 87" fill="none" stroke="#666" stroke-width="1.4" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto"><path d="M 0 0 L 6 3 L 0 6" fill="#666"/></marker></defs>
</svg>
