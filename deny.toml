[advisories]
unmaintained = "workspace"
yanked = "warn"

[licenses]
allow = ["MIT", "Apache-2.0", "Unicode-3.0", "BSD-2-Clause", "BSD-3-Clause", "ISC", "Zlib"]

[[licenses.exceptions]]
allow = ["Unicode-DFS-2016"]
crate = "unicode-ident"

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/pulseengine/rivet"]
